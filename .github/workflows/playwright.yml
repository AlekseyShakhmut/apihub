name: API Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 3 * * *'  # ежедневный прогон в 3:00 ночи
  workflow_dispatch:      # ручной запуск из интерфейса GitHub

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    # Параллельный запуск по модулям
    strategy:
      fail-fast: false  # не останавливать другие при падении одного
      matrix:
        module: [products, auth, advanced, random_products]
        # можно добавить другие модули по мере роста

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          echo "ADMIN_USER_PASSWORD=${{ secrets.ADMIN_USER_PASSWORD }}" >> .env
          echo "TEST_USER_PASSWORD=${{ secrets.TEST_USER_PASSWORD }}" >> .env
          echo "API_BASE_URL=https://api.freeapi.app/api/v1" >> .env

      - name: Run tests for ${{ matrix.module }}
        run: npx playwright test tests/${{ matrix.module }}/ --reporter=html,allure-playwright,list
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.module }}-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
            allure-results/
          retention-days: 30

      - name: Generate Allure report
        if: always()
        run: |
          npx allure generate allure-results -o allure-report --clean || true

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.module }}
          path: allure-report/
          retention-days: 30

  # Отдельный job для отправки уведомлений
  notify:
    name: Send notification
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check status
        run: |
          echo "Тесты завершены"
      # Здесь можно добавить уведомление в Telegram/Slack